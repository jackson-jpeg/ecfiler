<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECFiler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{ink:'#0f1729','ink-2':'#1a2744','ink-3':'#243556',gold:'#d4a843','gold-dim':'#b8943d',surface:'#f7f8fa','surface-2':'#eef0f4',border:'#e3e6ed',ok:'#34d399',bad:'#f87171',warn:'#fbbf24'}}}}</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        [x-cloak] { display: none !important; }
        .drop-over { border-color: #d4a843 !important; background: #fefbf3 !important; }
        @keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: enter 0.3s ease-out both; }
        .step-enter { animation: enter 0.25s ease-out both; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse { animation: pulse 1.2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-surface min-h-screen flex flex-col text-ink" x-data="app()" x-cloak>

<!-- Nav -->
<header class="bg-ink sticky top-0 z-50 border-b border-white/[0.06]">
    <div class="max-w-[1080px] mx-auto h-12 flex items-center justify-between px-5">
        <div class="flex items-center gap-2.5">
            <div class="w-6 h-6 rounded-md bg-gold flex items-center justify-center">
                <span class="text-ink text-[11px] font-bold leading-none">E</span>
            </div>
            <span class="text-white text-sm font-semibold tracking-[-0.01em]">ECFiler</span>
        </div>
        <div class="flex items-center gap-0.5 text-[13px]">
            <template x-for="t in tabs" :key="t.id">
                <button @click="go(t.id)" class="px-3 py-1.5 rounded-md transition-all"
                    :class="view===t.id ? 'bg-white/[0.08] text-white font-medium' : 'text-white/40 hover:text-white/70 hover:bg-white/[0.04]'"
                    x-text="t.label"></button>
            </template>
            <div class="w-px h-4 bg-white/10 mx-1.5"></div>
            <a href="/docs" target="_blank" class="px-2 py-1.5 text-white/30 hover:text-white/60 transition">Docs</a>
        </div>
    </div>
</header>

<main class="flex-1 max-w-[1080px] mx-auto w-full px-5 py-8">

<!-- ====== FILE ====== -->
<template x-if="view==='file'">
<div>
    <!-- Upload -->
    <div x-show="step==='upload'" class="animate-in">
        <div class="max-w-xl mx-auto">
            <h1 class="text-[28px] font-bold tracking-[-0.03em] text-center mb-2">Drop a document</h1>
            <p class="text-center text-ink/40 mb-8">AI reads your filing and extracts everything. You just confirm.</p>

            <div class="bg-white border border-border rounded-xl p-16 text-center cursor-pointer hover:border-gold/40 transition-all group"
                @click="$refs.fi.click()"
                @dragover.prevent="$event.currentTarget.classList.add('drop-over')"
                @dragleave.prevent="$event.currentTarget.classList.remove('drop-over')"
                @drop.prevent="$event.currentTarget.classList.remove('drop-over'); upload($event.dataTransfer.files[0])">
                <div class="w-12 h-12 rounded-lg bg-surface mx-auto mb-4 flex items-center justify-center group-hover:bg-gold/5 transition">
                    <svg class="w-6 h-6 text-ink/20 group-hover:text-gold/60 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.338-2.32 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"/></svg>
                </div>
                <p class="text-sm font-medium text-ink/60 mb-1">Drop PDF or click to browse</p>
                <p class="text-xs text-ink/30">Motions, briefs, complaints, notices, petitions</p>
                <input type="file" x-ref="fi" accept=".pdf" class="hidden" @change="upload($event.target.files[0])">
            </div>

            <div class="flex justify-center gap-6 mt-6 text-xs text-ink/30">
                <span>150 courts</span><span>&middot;</span><span>7 safety gates</span><span>&middot;</span><span>AI-powered</span>
            </div>
        </div>
    </div>

    <!-- Analyzing (real-time SSE) -->
    <div x-show="step==='analyzing'" class="animate-in">
        <div class="max-w-lg mx-auto">
            <div class="bg-white border border-border rounded-xl overflow-hidden">
                <div class="px-5 py-4 border-b border-border flex items-center justify-between">
                    <div>
                        <div class="text-sm font-semibold">Analyzing</div>
                        <div class="text-xs text-ink/40 mono" x-text="fileName"></div>
                    </div>
                    <div class="w-2 h-2 rounded-full bg-gold pulse"></div>
                </div>
                <div class="p-5 space-y-0">
                    <template x-for="s in liveSteps" :key="s.id">
                        <div class="flex items-start gap-3 py-2.5 step-enter" :style="'animation-delay:' + (s.id * 0.05) + 's'">
                            <div class="w-5 h-5 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 text-[10px] font-medium"
                                :class="{
                                    'bg-ok/10 text-ok': s.status==='done',
                                    'bg-gold/10 text-gold': s.status==='running',
                                    'bg-warn/10 text-warn': s.status==='warn',
                                    'bg-bad/10 text-bad': s.status==='error',
                                }">
                                <span x-show="s.status==='done'">&#10003;</span>
                                <span x-show="s.status==='running'" class="w-1.5 h-1.5 rounded-full bg-gold pulse"></span>
                                <span x-show="s.status==='warn'">!</span>
                                <span x-show="s.status==='error'">&times;</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm" :class="s.status==='running' ? 'text-ink font-medium' : 'text-ink/70'" x-text="s.label"></div>
                                <div x-show="s.detail" class="text-xs mt-0.5 mono" :class="s.status==='error' ? 'text-bad' : 'text-ink/30'" x-text="s.detail"></div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Review — AI confirmation conversation -->
    <div x-show="step==='review'" class="animate-in">
        <template x-if="filing">
        <div class="max-w-2xl mx-auto">

            <!-- AI message: here's what I'm about to file -->
            <div class="mb-5">
                <div class="flex items-start gap-3 mb-4">
                    <div class="w-7 h-7 rounded-lg bg-gold flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span class="text-ink text-[10px] font-bold">E</span>
                    </div>
                    <div class="text-sm text-ink/70 leading-relaxed">
                        I've analyzed your document. Here's what I'm about to file on CM/ECF. Please review everything below and confirm.
                    </div>
                </div>
            </div>

            <!-- What I'm filing -->
            <div class="bg-white border border-border rounded-xl overflow-hidden mb-4">
                <div class="px-5 py-3 border-b border-border bg-surface/50">
                    <div class="text-[11px] font-semibold text-ink/40 uppercase tracking-wider">Filing Summary</div>
                </div>
                <div class="p-5 space-y-4">
                    <!-- Document -->
                    <div>
                        <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Document</div>
                        <div class="text-sm font-semibold" x-text="filing.document_type"></div>
                        <div class="text-xs text-ink/40 mono mt-0.5" x-text="fileName + ' — ' + filing.pdf_size_mb?.toFixed(1) + 'MB, ' + filing.pdf_pages + ' pages'"></div>
                    </div>

                    <div class="border-t border-border"></div>

                    <!-- Case -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Case Number</div>
                            <div class="text-sm font-semibold mono" x-text="filing.case_number || 'Not detected'"></div>
                        </div>
                        <div>
                            <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Court</div>
                            <div class="text-sm font-semibold" x-text="filing.court_id ? filing.court_id.toUpperCase() : 'Not detected'"></div>
                        </div>
                    </div>

                    <div x-show="filing.case_caption">
                        <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Caption</div>
                        <div class="text-sm" x-text="filing.case_caption"></div>
                    </div>

                    <div class="border-t border-border"></div>

                    <!-- Docket text / Event -->
                    <div>
                        <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Docket Text (what CM/ECF will show)</div>
                        <div class="text-sm font-semibold" x-text="filing.event_description"></div>
                        <div class="text-xs text-ink/30 mono mt-0.5" x-text="'Event code: ' + filing.event_code"></div>
                    </div>

                    <!-- Response linkage -->
                    <div x-show="filing.is_response" class="bg-surface rounded-lg p-3">
                        <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Linked to</div>
                        <div class="text-sm" x-text="filing.responds_to"></div>
                    </div>

                    <div class="border-t border-border"></div>

                    <!-- Filed by -->
                    <div>
                        <div class="text-[11px] font-medium text-ink/30 uppercase tracking-wide mb-1">Filing on behalf of</div>
                        <div class="text-sm font-semibold" x-text="filing.filing_party || 'Not detected'"></div>
                    </div>
                </div>
            </div>

            <!-- Verification checks -->
            <div class="bg-white border border-border rounded-xl overflow-hidden mb-4">
                <div class="px-5 py-3 border-b border-border bg-surface/50">
                    <div class="text-[11px] font-semibold text-ink/40 uppercase tracking-wider">Verification</div>
                </div>
                <div class="p-4 space-y-2.5">
                    <!-- PDF valid -->
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]" :class="filing.pdf_valid?'bg-ok/10 text-ok':'bg-bad/10 text-bad'" x-text="filing.pdf_valid?'&#10003;':'&#10007;'"></div>
                        <span class="text-sm" x-text="filing.pdf_valid ? 'PDF is valid and meets CM/ECF requirements' : 'PDF has issues — see errors above'"></span>
                    </div>
                    <!-- Redaction -->
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]" :class="filing.redaction_issues===0?'bg-ok/10 text-ok':'bg-warn/10 text-warn'" x-text="filing.redaction_issues===0?'&#10003;':'!'"></div>
                        <span class="text-sm" x-text="filing.redaction_issues===0 ? 'No unredacted personal identifiers (Rule 5.2)' : filing.redaction_issues + ' potential redaction issue(s) — review before filing'"></span>
                    </div>
                    <!-- Case number match -->
                    <div class="flex items-center gap-3" x-show="filing.case_number">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] bg-ok/10 text-ok">&#10003;</div>
                        <span class="text-sm">Case number <span class="mono font-medium" x-text="filing.case_number"></span> matches document</span>
                    </div>
                    <!-- Event code match -->
                    <div class="flex items-center gap-3" x-show="filing.event_code">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] bg-ok/10 text-ok">&#10003;</div>
                        <span class="text-sm">Event code <span class="mono font-medium" x-text="filing.event_code"></span> matches document type</span>
                    </div>
                    <!-- Certificate of Service -->
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]" :class="filing.warnings?.some(w=>w.includes('certificate')) ? 'bg-warn/10 text-warn' : 'bg-ok/10 text-ok'" x-text="filing.warnings?.some(w=>w.includes('certificate')) ? '!' : '&#10003;'"></div>
                        <span class="text-sm" x-text="filing.warnings?.some(w=>w.includes('certificate')) ? 'No certificate of service detected — add one if required' : 'Certificate of service present'"></span>
                    </div>
                    <!-- Confidence -->
                    <div class="flex items-center gap-3">
                        <div class="w-5 h-5 rounded-full flex items-center justify-center text-[10px]" :class="filing.confidence==='high'?'bg-ok/10 text-ok':'bg-warn/10 text-warn'">
                            <span x-text="filing.confidence==='high'?'&#10003;':'?'"></span>
                        </div>
                        <span class="text-sm">AI confidence: <span class="font-medium" x-text="filing.confidence"></span></span>
                    </div>
                </div>
            </div>

            <!-- Warnings -->
            <template x-for="w in (filing.warnings||[]).filter(w=>!w.includes('certificate'))" :key="w">
                <div class="flex items-start gap-2 px-4 py-2.5 bg-warn/5 border border-warn/20 rounded-lg text-sm text-warn mb-2">
                    <span class="text-xs mt-0.5 font-bold">!</span><span x-text="w"></span>
                </div>
            </template>

            <!-- AI message: ready? -->
            <div class="flex items-start gap-3 mt-5 mb-4">
                <div class="w-7 h-7 rounded-lg bg-gold flex items-center justify-center flex-shrink-0 mt-0.5">
                    <span class="text-ink text-[10px] font-bold">E</span>
                </div>
                <div class="text-sm text-ink/70 leading-relaxed" x-text="filing.ready ? 'Everything looks good. Ready to file?' : 'Some required fields are missing. Please review the issues above.'"></div>
            </div>

            <!-- Confirm -->
            <div class="flex gap-3 ml-10">
                <button @click="confirm()" :disabled="!filing.ready"
                    class="px-8 py-2.5 rounded-lg text-sm font-semibold transition-all"
                    :class="filing.ready?'bg-ink text-white hover:bg-ink-2 shadow-sm':'bg-ink/5 text-ink/20 cursor-not-allowed'">
                    Confirm &amp; File
                </button>
                <button @click="reset()" class="px-5 py-2.5 text-sm text-ink/40 hover:text-ink transition">Cancel</button>
            </div>
        </div>
        </template>
    </div>

    <!-- Filed -->
    <div x-show="step==='filed'" class="animate-in">
        <div class="max-w-md mx-auto text-center">
            <div class="w-14 h-14 rounded-2xl bg-ok/10 flex items-center justify-center mx-auto mb-5">
                <svg class="w-7 h-7 text-ok" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-xl font-bold mb-6" x-text="filingResult?.status==='dry_run'?'Dry Run Complete':'Filed'"></h2>
            <div class="bg-white border border-border rounded-xl overflow-hidden text-left mb-6">
                <template x-for="[k,v] in [['Court',filing?.court_id],['Case',filing?.case_number],['Event',filing?.event_description],['Status',filingResult?.status]].filter(x=>x[1])">
                    <div class="flex px-5 py-2.5 border-b last:border-0 text-sm"><span class="w-20 text-ink/30" x-text="k"></span><span x-text="v"></span></div>
                </template>
            </div>
            <button @click="reset()" class="px-6 py-2.5 bg-ink text-white text-sm font-semibold rounded-lg hover:bg-ink-2 transition shadow-sm">File Another</button>
        </div>
    </div>

    <!-- Error -->
    <div x-show="step==='error'" class="animate-in">
        <div class="max-w-sm mx-auto text-center">
            <div class="w-14 h-14 rounded-2xl bg-bad/10 flex items-center justify-center mx-auto mb-5">
                <svg class="w-7 h-7 text-bad" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            </div>
            <h3 class="text-lg font-bold mb-2">Analysis failed</h3>
            <p class="text-sm text-ink/40 mb-6" x-text="errorMsg"></p>
            <button @click="reset()" class="px-6 py-2.5 bg-ink text-white text-sm font-semibold rounded-lg hover:bg-ink-2 transition shadow-sm">Try Again</button>
        </div>
    </div>
</div>
</template>

<!-- ====== VALIDATE ====== -->
<template x-if="view==='validate'">
<div class="animate-in max-w-2xl mx-auto">
    <h1 class="text-xl font-bold mb-1">Validate PDFs</h1>
    <p class="text-sm text-ink/40 mb-6">Check CM/ECF requirements. No API key needed.</p>
    <div class="bg-white border border-dashed border-border rounded-xl p-10 text-center cursor-pointer hover:border-gold/40 transition mb-5"
        @click="$refs.vi.click()" @dragover.prevent @drop.prevent="valDrop($event)">
        <p class="text-sm text-ink/50">Drop PDFs here or click</p>
        <input type="file" x-ref="vi" accept=".pdf" multiple class="hidden" @change="valRun($event)">
    </div>
    <div x-show="valBusy" class="text-center py-4"><div class="w-2 h-2 rounded-full bg-gold pulse inline-block"></div></div>
    <div x-show="valR.length>0" class="bg-white border border-border rounded-xl overflow-hidden">
        <div class="px-5 py-3 border-b flex justify-between text-sm"><span class="font-medium">Results</span><span class="mono text-ink/40" x-text="valOk+'/'+valR.length+' passed'"></span></div>
        <template x-for="r in valR" :key="r.name">
            <div class="px-5 py-3 border-b last:border-0">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2"><div class="w-4 h-4 rounded-full text-[10px] flex items-center justify-center" :class="r.valid?'bg-ok/10 text-ok':'bg-bad/10 text-bad'" x-text="r.valid?'&#10003;':'&#10007;'"></div><span class="text-sm font-medium" x-text="r.name"></span></div>
                    <span class="text-xs text-ink/30 mono" x-text="r.size+', '+r.pages+'p'"></span>
                </div>
                <template x-for="e in r.errors"><div class="text-xs text-bad ml-6 mt-1" x-text="e"></div></template>
                <template x-for="w in r.warnings"><div class="text-xs text-warn ml-6 mt-1" x-text="w"></div></template>
                <div x-show="r.valid && !r.errors?.length" class="text-xs text-ok ml-6 mt-1">Ready for CM/ECF</div>
            </div>
        </template>
    </div>
</div>
</template>

<!-- ====== CERTIFICATE ====== -->
<template x-if="view==='cos'">
<div class="animate-in max-w-2xl mx-auto">
    <h1 class="text-xl font-bold mb-1">Certificate of Service</h1>
    <p class="text-sm text-ink/40 mb-6">Generate and download as PDF.</p>
    <div class="bg-white border border-border rounded-xl p-5 mb-4">
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div><label class="block text-[11px] font-medium text-ink/40 uppercase tracking-wide mb-1">Attorney</label><input x-model="cosAtty" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-gold/30 focus:border-gold outline-none" placeholder="Jane Smith, Esq."></div>
            <div><label class="block text-[11px] font-medium text-ink/40 uppercase tracking-wide mb-1">Case</label><input x-model="cosCase" class="w-full px-3 py-2 border border-border rounded-lg text-sm focus:ring-1 focus:ring-gold/30 focus:border-gold outline-none" placeholder="1:24-cv-01234"></div>
        </div>
        <div class="mb-4">
            <div class="flex justify-between mb-2"><label class="text-[11px] font-medium text-ink/40 uppercase tracking-wide">Recipients</label><button @click="cosR.push({name:'',attorney_name:'',method:'CM/ECF',email:'',address:''})" class="text-xs text-gold font-medium">+ Add</button></div>
            <template x-for="(r,i) in cosR" :key="i">
                <div class="flex gap-2 mb-2">
                    <input x-model="r.name" placeholder="Party" class="flex-1 px-2.5 py-1.5 border border-border rounded-lg text-sm outline-none focus:border-gold/40">
                    <input x-model="r.attorney_name" placeholder="Attorney" class="flex-1 px-2.5 py-1.5 border border-border rounded-lg text-sm outline-none focus:border-gold/40">
                    <select x-model="r.method" class="px-2 py-1.5 border border-border rounded-lg text-sm bg-white outline-none"><option>CM/ECF</option><option value="email">Email</option><option value="mail">Mail</option></select>
                    <button @click="cosR.splice(i,1)" class="text-ink/20 hover:text-bad text-lg leading-none">&times;</button>
                </div>
            </template>
        </div>
        <div class="flex gap-2">
            <button @click="genCos()" :disabled="!cosAtty" class="px-5 py-2 bg-ink text-white text-sm rounded-lg font-medium disabled:opacity-20 transition shadow-sm">Generate</button>
            <button @click="dlCos()" x-show="cosTxt" class="px-5 py-2 border border-border text-sm rounded-lg font-medium hover:bg-surface transition">Download PDF</button>
        </div>
    </div>
    <div x-show="cosTxt" class="bg-white border border-border rounded-xl overflow-hidden">
        <div class="px-5 py-2.5 border-b text-xs font-medium text-ink/40 uppercase tracking-wide">Preview</div>
        <pre class="p-5 text-sm whitespace-pre-wrap mono text-ink/70 leading-relaxed" x-text="cosTxt"></pre>
    </div>
</div>
</template>

<!-- ====== COURTS ====== -->
<template x-if="view==='courts'">
<div class="animate-in">
    <h1 class="text-xl font-bold mb-1">Courts</h1>
    <p class="text-sm text-ink/40 mb-5">150 federal district, bankruptcy, and appellate courts.</p>
    <div class="flex gap-2 mb-4">
        <input type="text" x-model="cSearch" @input.debounce.250ms="loadCourts()" placeholder="Search..." class="flex-1 px-3 py-2 border border-border rounded-lg text-sm bg-white outline-none focus:border-gold/40">
        <select x-model="cType" @change="loadCourts()" class="px-3 py-2 border border-border rounded-lg text-sm bg-white outline-none"><option value="">All</option><option value="district">District</option><option value="bankruptcy">Bankruptcy</option><option value="appellate">Appellate</option></select>
    </div>
    <div class="bg-white border border-border rounded-xl overflow-hidden">
        <table class="w-full text-sm"><thead class="border-b"><tr class="text-left text-[11px] font-medium text-ink/30 uppercase tracking-wide"><th class="px-5 py-2.5 w-20">ID</th><th class="px-5 py-2.5">Name</th><th class="px-5 py-2.5 w-28">Type</th></tr></thead>
        <tbody><template x-for="c in courts" :key="c.court_id"><tr class="border-b last:border-0 hover:bg-surface/50"><td class="px-5 py-2.5 mono font-medium text-ink-2" x-text="c.court_id"></td><td class="px-5 py-2.5" x-text="c.name"></td><td class="px-5 py-2.5"><span class="text-xs px-1.5 py-0.5 rounded-md" :class="{'bg-blue-50 text-blue-500':c.court_type==='district','bg-purple-50 text-purple-500':c.court_type==='bankruptcy','bg-amber-50 text-amber-600':c.court_type==='appellate'}" x-text="c.court_type"></span></td></tr></template></tbody></table>
        <div x-show="courts.length===0" class="p-10 text-center text-ink/20 text-sm">No courts found</div>
    </div>
</div>
</template>

<!-- ====== HISTORY ====== -->
<template x-if="view==='history'">
<div class="animate-in">
    <h1 class="text-xl font-bold mb-1">History</h1>
    <p class="text-sm text-ink/40 mb-5">Filing audit log.</p>
    <div class="bg-white border border-border rounded-xl overflow-hidden">
        <template x-if="hist.length>0">
            <table class="w-full text-sm"><thead class="border-b"><tr class="text-left text-[11px] font-medium text-ink/30 uppercase tracking-wide"><th class="px-5 py-2.5">Date</th><th class="px-5 py-2.5">Court</th><th class="px-5 py-2.5">Case</th><th class="px-5 py-2.5">Event</th><th class="px-5 py-2.5">Status</th></tr></thead>
            <tbody><template x-for="h in hist" :key="h.id"><tr class="border-b last:border-0"><td class="px-5 py-2.5 text-ink/40" x-text="h.filed_at?.substring(0,10)"></td><td class="px-5 py-2.5 mono" x-text="h.court_id"></td><td class="px-5 py-2.5" x-text="h.case_number"></td><td class="px-5 py-2.5 text-ink/60" x-text="h.event_description?.substring(0,40)"></td><td class="px-5 py-2.5"><span class="text-xs px-1.5 py-0.5 rounded-md bg-ok/10 text-ok" x-text="h.status"></span></td></tr></template></tbody></table>
        </template>
        <div x-show="hist.length===0" class="p-14 text-center text-ink/20 text-sm">No filings yet</div>
    </div>
</div>
</template>

<!-- ====== DRAFTS ====== -->
<template x-if="view==='drafts'">
<div class="animate-in">
    <h1 class="text-xl font-bold mb-1">Drafts</h1>
    <p class="text-sm text-ink/40 mb-5">Resume incomplete filings.</p>
    <div class="bg-white border border-border rounded-xl overflow-hidden">
        <template x-if="drafts.length>0">
            <table class="w-full text-sm"><thead class="border-b"><tr class="text-left text-[11px] font-medium text-ink/30 uppercase tracking-wide"><th class="px-5 py-2.5">Name</th><th class="px-5 py-2.5">Court</th><th class="px-5 py-2.5">Case</th><th class="px-5 py-2.5">Saved</th><th class="px-5 py-2.5 w-16"></th></tr></thead>
            <tbody><template x-for="d in drafts" :key="d.file"><tr class="border-b last:border-0"><td class="px-5 py-2.5 font-medium" x-text="d.name"></td><td class="px-5 py-2.5 mono text-ink/50" x-text="d.court"></td><td class="px-5 py-2.5 text-ink/50" x-text="d.case"></td><td class="px-5 py-2.5 text-ink/30" x-text="d.saved_at?.substring(0,10)"></td><td class="px-5 py-2.5"><button @click="delDraft(d.file)" class="text-xs text-ink/20 hover:text-bad">delete</button></td></tr></template></tbody></table>
        </template>
        <div x-show="drafts.length===0" class="p-14 text-center text-ink/20 text-sm">No drafts saved</div>
    </div>
</div>
</template>

</main>

<footer class="border-t border-border py-4 text-center text-[11px] text-ink/20 mt-auto">
    ECFiler is a filing tool, not a legal advisor. <a href="https://github.com/jackson-jpeg/ecfiler" class="hover:text-ink/40 transition">GitHub</a>
</footer>

<script>
function app() {
    return {
        view:'file', step:'upload', fileName:'', filing:null, filingResult:null, errorMsg:'',
        liveSteps:[], courts:[], cSearch:'', cType:'', hist:[], drafts:[], hasApiKey:true,
        valR:[], valOk:0, valBusy:false,
        cosAtty:'', cosCase:'', cosR:[{name:'',attorney_name:'',method:'CM/ECF',email:'',address:''}], cosTxt:'',
        tabs:[{id:'file',label:'File'},{id:'validate',label:'Validate'},{id:'cos',label:'Certificate'},{id:'courts',label:'Courts'},{id:'drafts',label:'Drafts'},{id:'history',label:'History'}],

        get fields(){
            if(!this.filing) return [];
            return [['Type',this.filing.document_type],['Case',this.filing.case_number],['Court',this.filing.court_id],
                ['Caption',this.filing.case_caption],['Event',this.filing.event_description?(this.filing.event_description+' ('+this.filing.event_code+')'):''],
                ['Party',this.filing.filing_party],['Response to',this.filing.is_response?this.filing.responds_to:null],
                ['Confidence',this.filing.confidence]].filter(f=>f[1]!==null);
        },

        init(){ this.loadCourts(); this.loadHist(); this.loadDrafts(); fetch('/api/health').then(r=>r.json()).then(d=>{this.hasApiKey=d.has_api_key}).catch(()=>{}); },
        go(id){ this.view=id; if(id==='courts')this.loadCourts(); if(id==='history')this.loadHist(); if(id==='drafts')this.loadDrafts(); },
        reset(){ this.step='upload';this.filing=null;this.filingResult=null;this.errorMsg='';this.fileName='';this.liveSteps=[]; },

        async upload(file){
            if(!file) return;
            this.fileName=file.name; this.step='analyzing'; this.liveSteps=[];
            try {
                const fd=new FormData(); fd.append('document',file);
                const resp=await fetch('/api/file/stream',{method:'POST',body:fd});
                if(!resp.ok){const t=await resp.text();throw new Error(t.substring(0,200));}
                const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf='';
                while(true){
                    const{done,value}=await reader.read(); if(done) break;
                    buf+=dec.decode(value,{stream:true});
                    const parts=buf.split('\n\n'); buf=parts.pop()||'';
                    for(const part of parts){
                        const lines=part.split('\n'); let event='',data='';
                        for(const l of lines){if(l.startsWith('event:'))event=l.slice(6).trim();if(l.startsWith('data:'))data=l.slice(5).trim();}
                        if(!data) continue;
                        const d=JSON.parse(data);
                        if(event==='step'){
                            const existing=this.liveSteps.find(s=>s.id===d.id);
                            if(existing){Object.assign(existing,d);}else{this.liveSteps.push({...d});}
                        }
                        if(event==='result'){this.filing=d; await new Promise(r=>setTimeout(r,300)); this.step='review';}
                        if(event==='error'){throw new Error(d.message);}
                    }
                }
            } catch(e){ this.errorMsg=e.message||'Failed'; this.step='error'; }
        },

        async confirm(){
            try{
                const r=await fetch('/api/filing/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({court_id:this.filing.court_id,case_number:this.filing.case_number,event_code:this.filing.event_code,event_description:this.filing.event_description,filing_party_name:this.filing.filing_party?.split('(')[0]?.trim()||'',filing_party_role:this.filing.filing_party?.match(/\((\w+)\)/)?.[1]||'',document_path:'',dry_run:false})});
                this.filingResult=await r.json();this.step='filed';this.loadHist();
            }catch(e){this.errorMsg=e.message;this.step='error';}
        },

        valDrop(e){e.preventDefault();this.valRun({target:{files:e.dataTransfer.files}});},
        async valRun(e){
            const files=Array.from(e.target.files);if(!files.length)return;this.valR=[];this.valBusy=true;this.valOk=0;
            for(const f of files){try{const fd=new FormData();fd.append('document',f);const r=await fetch('/api/validate',{method:'POST',body:fd});const v=await r.json();
                this.valR.push({name:f.name,valid:v.valid,size:v.file_size_mb?.toFixed(1)+'MB',pages:v.page_count,errors:v.errors||[],warnings:v.warnings||[]});
                if(v.valid)this.valOk++;}catch(e){this.valR.push({name:f.name,valid:false,size:'?',pages:0,errors:[e.message],warnings:[]});}}
            this.valBusy=false;
        },

        async loadCourts(){try{const p=new URLSearchParams();if(this.cSearch)p.set('search',this.cSearch);if(this.cType)p.set('court_type',this.cType);this.courts=await(await fetch('/api/courts?'+p)).json();}catch(e){}},
        async loadHist(){try{this.hist=await(await fetch('/api/history')).json();}catch(e){}},
        async loadDrafts(){try{this.drafts=await(await fetch('/api/drafts')).json();}catch(e){}},
        async delDraft(n){try{await fetch('/api/drafts/'+encodeURIComponent(n),{method:'DELETE'});this.loadDrafts();}catch(e){}},
        async genCos(){try{const r=await fetch('/api/certificate-of-service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({attorney_name:this.cosAtty,case_number:this.cosCase,recipients:this.cosR.filter(r=>r.name||r.attorney_name)})});this.cosTxt=(await r.json()).text;}catch(e){}},
        async dlCos(){try{const r=await fetch('/api/certificate-of-service/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({attorney_name:this.cosAtty,case_number:this.cosCase,recipients:this.cosR.filter(r=>r.name||r.attorney_name)})});const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='certificate_of_service.pdf';a.click();URL.revokeObjectURL(u);}catch(e){}}
    };
}
</script>
</body>
</html>
