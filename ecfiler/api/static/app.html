<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECFiler</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa; --surface: #fff; --border: #e8e8e8; --border-light: #f0f0f0;
  --text: #1a1a1a; --text-2: #666; --text-3: #999; --text-4: #bbb;
  --accent: #0066ff; --accent-bg: #f0f6ff; --accent-light: #e0edff;
  --ok: #00b341; --ok-bg: #edfbf2; --warn: #f59e0b; --warn-bg: #fffbeb; --bad: #ef4444; --bad-bg: #fef2f2;
  --radius: 12px; --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
.mono { font-family: 'JetBrains Mono', monospace; }
[x-cloak] { display: none !important; }

/* Nav */
nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); }
nav .inner { max-width: 880px; margin: 0 auto; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
nav .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
nav .logo-dot { width: 24px; height: 24px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700; }
nav .tabs { display: flex; gap: 2px; }
nav .tab { padding: 6px 14px; font-size: 13px; font-weight: 500; color: var(--text-3); border-radius: 8px; cursor: pointer; transition: all 0.15s; border: none; background: none; }
nav .tab:hover { color: var(--text-2); background: var(--bg); }
nav .tab.on { color: var(--text); background: var(--bg); }

/* Layout */
main { max-width: 880px; margin: 0 auto; padding: 40px 24px; width: 100%; flex: 1; }
h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
.sub { font-size: 14px; color: var(--text-3); margin-bottom: 28px; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid var(--border-light); font-size: 12px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; }
.card-body { padding: 20px; }
.card-row { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border-light); font-size: 14px; }
.card-row:last-child { border-bottom: none; }
.card-label { width: 120px; font-size: 12px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; }
.card-value { color: var(--text); }
.card-value.empty { color: var(--text-4); font-style: italic; }

/* Drop zone */
.drop { border: 2px dashed var(--border); border-radius: 16px; padding: 64px 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
.drop:hover, .drop.over { border-color: var(--accent); background: var(--accent-bg); }
.drop-icon { width: 48px; height: 48px; background: var(--bg); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; transition: all 0.2s; }
.drop:hover .drop-icon { background: var(--accent-light); }
.drop h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.drop p { font-size: 13px; color: var(--text-3); }

/* Steps */
.step { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; }
.step-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.step-dot.done { background: var(--ok-bg); color: var(--ok); }
.step-dot.run { background: var(--accent-bg); color: var(--accent); }
.step-dot.warn { background: var(--warn-bg); color: var(--warn); }
.step-dot.err { background: var(--bad-bg); color: var(--bad); }
.step-label { font-size: 14px; font-weight: 500; }
.step-detail { font-size: 12px; color: var(--text-3); margin-top: 2px; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.pulse { animation: pulse 1.2s ease-in-out infinite; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.25s ease-out both; }

/* Check row */
.check { display: flex; align-items: center; gap: 12px; padding: 10px 0; font-size: 14px; }
.check-dot { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }

/* AI message */
.ai-msg { display: flex; gap: 12px; margin: 20px 0; }
.ai-avatar { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.ai-text { font-size: 14px; color: var(--text-2); line-height: 1.6; padding-top: 4px; }

/* Section divider in card */
.divider { height: 1px; background: var(--border-light); margin: 16px 0; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 24px; font-size: 14px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; border: none; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #0055dd; }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-secondary { background: none; color: var(--text-3); }
.btn-secondary:hover { color: var(--text); }
.btn-dark { background: var(--text); color: white; }
.btn-dark:hover { background: #333; }
.btn-dark:disabled { opacity: 0.2; cursor: not-allowed; }

/* Warn banner */
.warn-banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; background: var(--warn-bg); border: 1px solid #fde68a; border-radius: var(--radius-sm); font-size: 13px; color: #92400e; margin-bottom: 12px; }

/* Input */
input[type="text"], select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; outline: none; transition: border 0.15s; background: var(--surface); }
input[type="text"]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
textarea { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'JetBrains Mono', monospace; outline: none; width: 100%; resize: vertical; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 20px; font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--bg); }
td { padding: 10px 20px; border-bottom: 1px solid var(--border-light); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfc; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-ok { background: var(--ok-bg); color: var(--ok); }
.badge-blue { background: #eef2ff; color: #4338ca; }
.badge-purple { background: #f5f3ff; color: #7c3aed; }
.badge-amber { background: #fffbeb; color: #b45309; }

footer { text-align: center; padding: 20px; font-size: 11px; color: var(--text-4); border-top: 1px solid var(--border-light); margin-top: auto; }
footer a { color: var(--text-3); }

@media(max-width:640px) { h1{font-size:20px;} main{padding:24px 16px;} .drop{padding:40px 20px;} .card-label{width:90px;} }
</style>
</head>
<body x-data="app()" x-cloak>

<nav>
<div class="inner">
    <a href="/" style="text-decoration:none;color:inherit" class="logo">
        <div class="logo-dot">E</div>
        <span>ECFiler</span>
    </a>
    <div class="tabs">
        <template x-for="t in tabs" :key="t.id">
            <button class="tab" :class="view===t.id&&'on'" @click="go(t.id)" x-text="t.label"></button>
        </template>
        <a href="/docs" target="_blank" class="tab" style="color:var(--text-4)">API</a>
    </div>
</div>
</nav>

<main>

<!-- FILE -->
<template x-if="view==='file'">
<div>
    <!-- Upload -->
    <div x-show="step==='upload'" class="fade-in" style="max-width:560px;margin:0 auto">
        <h1 style="text-align:center">Drop a document</h1>
        <p class="sub" style="text-align:center">AI reads your filing, extracts the details, and shows you exactly what it will submit.</p>
        <div class="drop" @click="$refs.fi.click()" @dragover.prevent="$event.currentTarget.classList.add('over')" @dragleave.prevent="$event.currentTarget.classList.remove('over')" @drop.prevent="$event.currentTarget.classList.remove('over');upload($event.dataTransfer.files[0])">
            <div class="drop-icon">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.338-2.32 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"/></svg>
            </div>
            <h3>Drop PDF or click to browse</h3>
            <p>Motions, briefs, complaints, notices, petitions</p>
            <input type="file" x-ref="fi" accept=".pdf" class="hidden" style="display:none" @change="upload($event.target.files[0])">
        </div>
        <div style="display:flex;justify-content:center;gap:24px;margin-top:24px;font-size:12px;color:var(--text-4)">
            <span>150 courts</span><span>&middot;</span><span>7 safety gates</span><span>&middot;</span><span>Real-time AI</span>
        </div>
    </div>

    <!-- Analyzing -->
    <div x-show="step==='analyzing'" class="fade-in" style="max-width:520px;margin:0 auto">
        <div class="card">
            <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
                <span>Analyzing</span>
                <span class="mono" style="font-size:11px;color:var(--text-4)" x-text="fileName"></span>
            </div>
            <div class="card-body">
                <template x-for="s in liveSteps" :key="s.id">
                    <div class="step fade-in">
                        <div class="step-dot" :class="{'done':s.status==='done','run':s.status==='running','warn':s.status==='warn','err':s.status==='error'}">
                            <span x-show="s.status==='done'">&#10003;</span>
                            <span x-show="s.status==='running'" class="pulse">&bull;</span>
                            <span x-show="s.status==='warn'">!</span>
                            <span x-show="s.status==='error'">&times;</span>
                        </div>
                        <div>
                            <div class="step-label" x-text="s.label"></div>
                            <div x-show="s.detail" class="step-detail mono" x-text="s.detail"></div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Review -->
    <div x-show="step==='review'" class="fade-in">
        <template x-if="filing">
        <div style="max-width:640px;margin:0 auto">
            <div class="ai-msg">
                <div class="ai-avatar">E</div>
                <div class="ai-text">I've analyzed your document. Here's exactly what I'll submit to CM/ECF. Review each section, then confirm.</div>
            </div>

            <!-- Filing summary -->
            <div class="card" style="margin-bottom:16px">
                <div class="card-header">What I'm Filing</div>
                <div class="card-body">
                    <div style="margin-bottom:16px">
                        <div style="font-size:18px;font-weight:700;letter-spacing:-0.02em" x-text="filing.document_type"></div>
                        <div class="mono" style="font-size:13px;color:var(--text-3);margin-top:4px" x-text="fileName"></div>
                    </div>
                    <div class="divider"></div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0">
                        <div>
                            <div style="font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Case</div>
                            <div class="mono" style="font-size:15px;font-weight:600" x-text="filing.case_number||'—'"></div>
                        </div>
                        <div>
                            <div style="font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Court</div>
                            <div style="font-size:15px;font-weight:600" x-text="filing.court_id?filing.court_id.toUpperCase():'—'"></div>
                        </div>
                    </div>
                    <div x-show="filing.case_caption" style="margin-bottom:16px">
                        <div style="font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Caption</div>
                        <div style="font-size:14px" x-text="filing.case_caption"></div>
                    </div>
                    <div class="divider"></div>
                    <div style="margin:16px 0">
                        <div style="font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Docket Text</div>
                        <div style="font-size:15px;font-weight:600" x-text="filing.event_description"></div>
                        <div class="mono" style="font-size:12px;color:var(--text-3);margin-top:3px" x-text="'Event code '+filing.event_code"></div>
                    </div>
                    <div x-show="filing.is_response" style="background:var(--accent-bg);padding:12px 16px;border-radius:var(--radius-sm);margin:12px 0">
                        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px">In response to</div>
                        <div style="font-size:14px" x-text="filing.responds_to"></div>
                    </div>
                    <div class="divider"></div>
                    <div>
                        <div style="font-size:11px;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Filing on behalf of</div>
                        <div style="font-size:14px;font-weight:600" x-text="filing.filing_party||'Not detected'"></div>
                    </div>
                </div>
            </div>

            <!-- Checks -->
            <div class="card" style="margin-bottom:16px">
                <div class="card-header">Verification Checks</div>
                <div class="card-body" style="padding:12px 20px">
                    <div class="check"><div class="check-dot" :style="filing.pdf_valid?'background:var(--ok-bg);color:var(--ok)':'background:var(--bad-bg);color:var(--bad)'" x-text="filing.pdf_valid?'&#10003;':'&#10007;'"></div><span x-text="filing.pdf_valid?'PDF valid — '+filing.pdf_size_mb?.toFixed(1)+'MB, '+filing.pdf_pages+' pages, meets CM/ECF requirements':'PDF has issues'"></span></div>
                    <div class="check"><div class="check-dot" :style="filing.redaction_issues===0?'background:var(--ok-bg);color:var(--ok)':'background:var(--warn-bg);color:var(--warn)'" x-text="filing.redaction_issues===0?'&#10003;':'!'"></div><span x-text="filing.redaction_issues===0?'No unredacted personal identifiers (Rule 5.2)':filing.redaction_issues+' potential redaction issue(s)'"></span></div>
                    <div class="check" x-show="filing.case_number"><div class="check-dot" style="background:var(--ok-bg);color:var(--ok)">&#10003;</div><span>Case number <b class="mono" x-text="filing.case_number"></b> matches PDF caption</span></div>
                    <div class="check" x-show="filing.event_code"><div class="check-dot" style="background:var(--ok-bg);color:var(--ok)">&#10003;</div><span>Event code <b class="mono" x-text="filing.event_code"></b> matches document type</span></div>
                    <div class="check"><div class="check-dot" :style="filing.warnings?.some(w=>w.includes('certificate'))?'background:var(--warn-bg);color:var(--warn)':'background:var(--ok-bg);color:var(--ok)'" x-text="filing.warnings?.some(w=>w.includes('certificate'))?'!':'&#10003;'"></div><span x-text="filing.warnings?.some(w=>w.includes('certificate'))?'No certificate of service detected':'Certificate of service present'"></span></div>
                    <div class="check"><div class="check-dot" :style="filing.confidence==='high'?'background:var(--ok-bg);color:var(--ok)':'background:var(--warn-bg);color:var(--warn)'" x-text="filing.confidence==='high'?'&#10003;':'?'"></div><span>AI confidence: <b x-text="filing.confidence"></b></span></div>
                </div>
            </div>

            <!-- Warnings -->
            <template x-for="w in (filing.warnings||[]).filter(w=>!w.includes('certificate'))" :key="w">
                <div class="warn-banner" style="margin-bottom:8px"><b>!</b><span x-text="w"></span></div>
            </template>

            <!-- Confirm -->
            <div class="ai-msg" style="margin-top:20px">
                <div class="ai-avatar">E</div>
                <div class="ai-text" x-text="filing.ready?'Everything checks out. Ready to file?':'Some required fields are missing. Review the issues above.'"></div>
            </div>
            <div style="margin-left:40px;margin-top:12px;display:flex;gap:10px">
                <button class="btn btn-dark" @click="confirm()" :disabled="!filing.ready">Confirm &amp; File</button>
                <button class="btn btn-secondary" @click="reset()">Cancel</button>
            </div>
        </div>
        </template>
    </div>

    <!-- Filed -->
    <div x-show="step==='filed'" class="fade-in" style="max-width:480px;margin:0 auto;text-align:center">
        <div style="width:56px;height:56px;background:var(--ok-bg);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
            <svg width="28" height="28" fill="none" stroke="var(--ok)" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 style="margin-bottom:20px" x-text="filingResult?.status==='dry_run'?'Dry Run Complete':'Filed'"></h1>
        <div class="card" style="text-align:left;margin-bottom:24px">
            <template x-for="[k,v] in [['Court',filing?.court_id],['Case',filing?.case_number],['Event',filing?.event_description],['Status',filingResult?.status]].filter(x=>x[1])">
                <div class="card-row"><div class="card-label" x-text="k"></div><div class="card-value" x-text="v"></div></div>
            </template>
        </div>
        <button class="btn btn-dark" @click="reset()">File Another</button>
    </div>

    <!-- Error -->
    <div x-show="step==='error'" class="fade-in" style="max-width:400px;margin:0 auto;text-align:center">
        <div style="width:56px;height:56px;background:var(--bad-bg);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
            <svg width="28" height="28" fill="none" stroke="var(--bad)" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
        </div>
        <h1 style="font-size:18px;margin-bottom:8px">Analysis Failed</h1>
        <p style="font-size:14px;color:var(--text-3);margin-bottom:24px" x-text="errorMsg"></p>
        <button class="btn btn-dark" @click="reset()">Try Again</button>
    </div>
</div>
</template>

<!-- VALIDATE -->
<template x-if="view==='validate'">
<div class="fade-in">
    <h1>Validate PDFs</h1>
    <p class="sub">Check CM/ECF requirements. No API key needed.</p>
    <div class="drop" style="padding:40px;margin-bottom:20px" @click="$refs.vi.click()" @dragover.prevent @drop.prevent="valDrop($event)">
        <h3>Drop PDFs here or click</h3>
        <p>Checks format, size, text, encryption, redaction</p>
        <input type="file" x-ref="vi" accept=".pdf" multiple style="display:none" @change="valRun($event)">
    </div>
    <div x-show="valR.length>0" class="card">
        <div class="card-header" style="display:flex;justify-content:space-between"><span>Results</span><span class="mono" x-text="valOk+'/'+valR.length+' passed'"></span></div>
        <template x-for="r in valR" :key="r.name">
            <div style="padding:14px 20px;border-bottom:1px solid var(--border-light)">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <div style="display:flex;align-items:center;gap:10px">
                        <div class="check-dot" :style="r.valid?'background:var(--ok-bg);color:var(--ok)':'background:var(--bad-bg);color:var(--bad)'" x-text="r.valid?'&#10003;':'&#10007;'"></div>
                        <span style="font-size:14px;font-weight:500" x-text="r.name"></span>
                    </div>
                    <span class="mono" style="font-size:12px;color:var(--text-4)" x-text="r.size+', '+r.pages+'p'"></span>
                </div>
                <template x-for="e in r.errors"><div style="font-size:12px;color:var(--bad);margin:4px 0 0 34px" x-text="e"></div></template>
                <template x-for="w in r.warnings"><div style="font-size:12px;color:var(--warn);margin:4px 0 0 34px" x-text="w"></div></template>
                <div x-show="r.valid && !r.errors?.length" style="font-size:12px;color:var(--ok);margin:4px 0 0 34px">Ready for CM/ECF</div>
            </div>
        </template>
    </div>
</div>
</template>

<!-- CERTIFICATE -->
<template x-if="view==='cos'">
<div class="fade-in">
    <h1>Certificate of Service</h1>
    <p class="sub">Generate and download as PDF.</p>
    <div class="card" style="margin-bottom:16px">
        <div class="card-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
                <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Attorney</label><input type="text" x-model="cosAtty" placeholder="Jane Smith, Esq." style="width:100%"></div>
                <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Case</label><input type="text" x-model="cosCase" placeholder="1:24-cv-01234" style="width:100%"></div>
            </div>
            <div style="margin-bottom:16px">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px"><label style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.05em">Recipients</label><button @click="cosR.push({name:'',attorney_name:'',method:'CM/ECF'})" style="font-size:12px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer">+ Add</button></div>
                <template x-for="(r,i) in cosR" :key="i">
                    <div style="display:flex;gap:8px;margin-bottom:8px">
                        <input type="text" x-model="r.name" placeholder="Party" style="flex:1">
                        <input type="text" x-model="r.attorney_name" placeholder="Attorney" style="flex:1">
                        <select x-model="r.method" style="width:100px"><option>CM/ECF</option><option value="email">Email</option><option value="mail">Mail</option></select>
                        <button @click="cosR.splice(i,1)" style="border:none;background:none;color:var(--text-4);cursor:pointer;font-size:18px">&times;</button>
                    </div>
                </template>
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-dark" @click="genCos()" :disabled="!cosAtty">Generate</button>
                <button class="btn btn-secondary" x-show="cosTxt" @click="dlCos()">Download PDF</button>
            </div>
        </div>
    </div>
    <div x-show="cosTxt" class="card"><div class="card-header">Preview</div><pre style="padding:20px;font-size:13px;white-space:pre-wrap;line-height:1.7;color:var(--text-2)" class="mono" x-text="cosTxt"></pre></div>
</div>
</template>

<!-- COURTS -->
<template x-if="view==='courts'">
<div class="fade-in">
    <h1>Courts</h1>
    <p class="sub">150 federal district, bankruptcy, and appellate courts.</p>
    <div style="display:flex;gap:8px;margin-bottom:16px">
        <input type="text" x-model="cSearch" @input.debounce.250ms="loadCourts()" placeholder="Search..." style="flex:1">
        <select x-model="cType" @change="loadCourts()"><option value="">All</option><option value="district">District</option><option value="bankruptcy">Bankruptcy</option><option value="appellate">Appellate</option></select>
    </div>
    <div class="card">
        <table><thead><tr><th style="width:80px">ID</th><th>Name</th><th style="width:110px">Type</th></tr></thead>
        <tbody><template x-for="c in courts" :key="c.court_id"><tr>
            <td class="mono" style="font-weight:600;color:var(--accent)" x-text="c.court_id"></td><td x-text="c.name"></td>
            <td><span class="badge" :class="{'badge-blue':c.court_type==='district','badge-purple':c.court_type==='bankruptcy','badge-amber':c.court_type==='appellate'}" x-text="c.court_type"></span></td>
        </tr></template></tbody></table>
        <div x-show="courts.length===0" style="padding:48px;text-align:center;color:var(--text-4);font-size:14px">No courts found</div>
    </div>
</div>
</template>

<!-- HISTORY -->
<template x-if="view==='history'">
<div class="fade-in">
    <h1>History</h1>
    <p class="sub">Filing audit log.</p>
    <div class="card">
        <template x-if="hist.length>0"><table><thead><tr><th>Date</th><th>Court</th><th>Case</th><th>Event</th><th>Status</th></tr></thead>
        <tbody><template x-for="h in hist" :key="h.id"><tr><td style="color:var(--text-3)" x-text="h.filed_at?.substring(0,10)"></td><td class="mono" x-text="h.court_id"></td><td x-text="h.case_number"></td><td style="color:var(--text-2)" x-text="h.event_description?.substring(0,40)"></td><td><span class="badge badge-ok" x-text="h.status"></span></td></tr></template></tbody></table></template>
        <div x-show="hist.length===0" style="padding:48px;text-align:center;color:var(--text-4);font-size:14px">No filings yet</div>
    </div>
</div>
</template>

<!-- DRAFTS -->
<template x-if="view==='drafts'">
<div class="fade-in">
    <h1>Drafts</h1>
    <p class="sub">Resume incomplete filings.</p>
    <div class="card">
        <template x-if="drafts.length>0"><table><thead><tr><th>Name</th><th>Court</th><th>Case</th><th>Saved</th><th style="width:60px"></th></tr></thead>
        <tbody><template x-for="d in drafts" :key="d.file"><tr><td style="font-weight:600" x-text="d.name"></td><td class="mono" style="color:var(--text-3)" x-text="d.court"></td><td style="color:var(--text-3)" x-text="d.case"></td><td style="color:var(--text-4)" x-text="d.saved_at?.substring(0,10)"></td><td><button @click="delDraft(d.file)" style="font-size:11px;color:var(--text-4);background:none;border:none;cursor:pointer">delete</button></td></tr></template></tbody></table></template>
        <div x-show="drafts.length===0" style="padding:48px;text-align:center;color:var(--text-4);font-size:14px">No drafts saved</div>
    </div>
</div>
</template>

</main>

<footer>ECFiler is a filing tool, not a legal advisor. <a href="https://github.com/jackson-jpeg/ecfiler">GitHub</a></footer>

<script>
function app(){return{
view:'file',step:'upload',fileName:'',filing:null,filingResult:null,errorMsg:'',liveSteps:[],
courts:[],cSearch:'',cType:'',hist:[],drafts:[],
valR:[],valOk:0,
cosAtty:'',cosCase:'',cosR:[{name:'',attorney_name:'',method:'CM/ECF'}],cosTxt:'',
tabs:[{id:'file',label:'File'},{id:'validate',label:'Validate'},{id:'cos',label:'Certificate'},{id:'courts',label:'Courts'},{id:'drafts',label:'Drafts'},{id:'history',label:'History'}],
get fields(){if(!this.filing)return[];return[['Type',this.filing.document_type],['Case',this.filing.case_number],['Court',this.filing.court_id],['Caption',this.filing.case_caption],['Event',this.filing.event_description?this.filing.event_description+' ('+this.filing.event_code+')':''],['Party',this.filing.filing_party]].filter(f=>f[1])},
init(){this.loadCourts();this.loadHist();fetch('/api/drafts').then(r=>r.json()).then(d=>{this.drafts=d}).catch(()=>{});},
go(id){this.view=id;if(id==='courts')this.loadCourts();if(id==='history')this.loadHist();if(id==='drafts')fetch('/api/drafts').then(r=>r.json()).then(d=>{this.drafts=d}).catch(()=>{});},
reset(){this.step='upload';this.filing=null;this.filingResult=null;this.errorMsg='';this.fileName='';this.liveSteps=[];},
async upload(file){if(!file)return;this.fileName=file.name;this.step='analyzing';this.liveSteps=[];
try{const fd=new FormData();fd.append('document',file);const resp=await fetch('/api/file/stream',{method:'POST',body:fd});
if(!resp.ok){throw new Error((await resp.text()).substring(0,200));}
const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
while(true){const{done,value}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
const parts=buf.split('\n\n');buf=parts.pop()||'';
for(const part of parts){const lines=part.split('\n');let ev='',data='';for(const l of lines){if(l.startsWith('event:'))ev=l.slice(6).trim();if(l.startsWith('data:'))data=l.slice(5).trim();}
if(!data)continue;const d=JSON.parse(data);
if(ev==='step'){const ex=this.liveSteps.find(s=>s.id===d.id);if(ex)Object.assign(ex,d);else this.liveSteps.push({...d});}
if(ev==='result'){this.filing=d;await new Promise(r=>setTimeout(r,400));this.step='review';}
if(ev==='error')throw new Error(d.message);}}
}catch(e){this.errorMsg=e.message||'Failed';this.step='error';}},
async confirm(){try{const r=await fetch('/api/filing/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({court_id:this.filing.court_id,case_number:this.filing.case_number,event_code:this.filing.event_code,event_description:this.filing.event_description,filing_party_name:this.filing.filing_party?.split('(')[0]?.trim()||'',filing_party_role:this.filing.filing_party?.match(/\((\w+)\)/)?.[1]||'',document_path:'',dry_run:false})});this.filingResult=await r.json();this.step='filed';this.loadHist();}catch(e){this.errorMsg=e.message;this.step='error';}},
valDrop(e){e.preventDefault();this.valRun({target:{files:e.dataTransfer.files}});},
async valRun(e){const files=Array.from(e.target.files);if(!files.length)return;this.valR=[];this.valOk=0;
for(const f of files){try{const fd=new FormData();fd.append('document',f);const r=await fetch('/api/validate',{method:'POST',body:fd});const v=await r.json();
this.valR.push({name:f.name,valid:v.valid,size:v.file_size_mb?.toFixed(1)+'MB',pages:v.page_count,errors:v.errors||[],warnings:v.warnings||[]});if(v.valid)this.valOk++;}catch(e){this.valR.push({name:f.name,valid:false,size:'?',pages:0,errors:[e.message],warnings:[]});}}},
async loadCourts(){try{const p=new URLSearchParams();if(this.cSearch)p.set('search',this.cSearch);if(this.cType)p.set('court_type',this.cType);this.courts=await(await fetch('/api/courts?'+p)).json();}catch(e){}},
async loadHist(){try{this.hist=await(await fetch('/api/history')).json();}catch(e){}},
async delDraft(n){try{await fetch('/api/drafts/'+encodeURIComponent(n),{method:'DELETE'});this.drafts=await(await fetch('/api/drafts')).json();}catch(e){}},
async genCos(){try{const r=await fetch('/api/certificate-of-service',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({attorney_name:this.cosAtty,case_number:this.cosCase,recipients:this.cosR.filter(r=>r.name||r.attorney_name)})});this.cosTxt=(await r.json()).text;}catch(e){}},
async dlCos(){try{const r=await fetch('/api/certificate-of-service/pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({attorney_name:this.cosAtty,case_number:this.cosCase,recipients:this.cosR.filter(r=>r.name||r.attorney_name)})});const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='certificate_of_service.pdf';a.click();URL.revokeObjectURL(u);}catch(e){}}
}}
</script>
</body>
</html>
