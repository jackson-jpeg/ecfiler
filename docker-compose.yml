services:
  ecfiler:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ECFILER_ENCRYPTION_KEY=${ECFILER_ENCRYPTION_KEY}
      - ECFILER_ALLOWED_ORIGINS=${ECFILER_ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - ecfiler-data:/data/.ecfiler
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ecfiler-data:
